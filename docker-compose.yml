version: '3.8'

services:
  wound-analysis:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=False
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - DATASET_PATH=/app/dataset
      - MODEL_SAVE_PATH=/app/models
      - UPLOAD_FOLDER=/app/uploads
      - REPORT_FOLDER=/app/reports
      - LOG_LEVEL=INFO
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

